<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GIF → Animated WebP Converter</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; padding: 2rem; }
      .container { max-width: 640px; margin: 0 auto; }
      .preview { margin-top: 1rem; }
      .error { color: #b00020; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>GIF → Animated WebP</h1>
      <p>Upload an animated GIF and get a moving WebP back (served inline).</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      {% if webp_b64 %}
        <h2>Preview</h2>
        <img src="data:image/webp;base64,{{ webp_b64 }}" alt="Converted WebP" style="max-width:100%;height:auto;">
        <p><a href="data:image/webp;base64,{{ webp_b64 }}" download="converted.webp">Download converted.webp</a></p>
        <p><a href="">Convert another GIF</a></p>
      {% else %}
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <label for="gif">Choose GIF file</label><br>
          <input id="gif" type="file" name="gif" accept="image/gif" required><br><br>
          <button type="submit">Convert to WebP</button>
        </form>
      {% endif %}
    </div>
  </body>
</html>
